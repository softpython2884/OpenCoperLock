name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @opencoperlock/shared build

      - name: Generate Prisma client
        run: pnpm --filter @opencoperlock/api prisma:generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build (web + api)
        run: pnpm --filter @opencoperlock/api build && pnpm --filter @opencoperlock/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.web
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
